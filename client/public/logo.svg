<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3561"/>
      <stop offset="100%" style="stop-color:#1a1f3a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <linearGradient id="car" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5ff"/>
      <stop offset="100%" style="stop-color:#cbd5e8"/>
    </linearGradient>
    <radialGradient id="glow" cx="58%" cy="42%" r="50%">
      <stop offset="0%" style="stop-color:#6095f8;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:0"/>
    </radialGradient>
    <filter id="boltshadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#818cf8" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="310" cy="195" r="175" fill="none" stroke="white" stroke-width="1" opacity="0.07"/>
  <circle cx="310" cy="195" r="130" fill="none" stroke="white" stroke-width="1" opacity="0.05"/>

  <!-- Car — side view -->
  <g transform="translate(248, 308)">
    <!-- Shadow -->
    <ellipse cx="0" cy="54" rx="148" ry="9" fill="#0d1020" opacity="0.35"/>
    <!-- Body -->
    <rect x="-148" y="-32" width="296" height="64" rx="18" fill="url(#car)"/>
    <!-- Cabin -->
    <path d="M-82 -32 Q-65 -90 -30 -98 L82 -98 Q112 -86 108 -32 Z" fill="url(#car)" opacity="0.95"/>
    <!-- Window left -->
    <path d="M-68 -36 Q-56 -78 -28 -86 L18 -86 L18 -36 Z" fill="#2d3561" opacity="0.8"/>
    <!-- Window right -->
    <path d="M26 -36 L26 -86 L80 -86 Q102 -78 100 -36 Z" fill="#2d3561" opacity="0.8"/>
    <!-- Separator -->
    <rect x="20" y="-86" width="5" height="50" fill="#1a1f3a" opacity="0.7"/>
    <!-- Headlight -->
    <rect x="132" y="-12" width="18" height="22" rx="5" fill="#7dd3fc" opacity="0.95"/>
    <rect x="134" y="-10" width="12" height="14" rx="3" fill="white" opacity="0.8"/>
    <!-- Taillight -->
    <rect x="-152" y="-10" width="10" height="18" rx="3" fill="#f87171" opacity="0.85"/>
    <!-- Wheel left -->
    <circle cx="-82" cy="38" r="30" fill="#1a1f3a" stroke="#7dd3fc" stroke-width="4"/>
    <circle cx="-82" cy="38" r="16" fill="#0d1020" stroke="#475569" stroke-width="2"/>
    <circle cx="-82" cy="38" r="5" fill="#7dd3fc"/>
    <!-- Wheel right -->
    <circle cx="82" cy="38" r="30" fill="#1a1f3a" stroke="#c4b5fd" stroke-width="4"/>
    <circle cx="82" cy="38" r="16" fill="#0d1020" stroke="#475569" stroke-width="2"/>
    <circle cx="82" cy="38" r="5" fill="#c4b5fd"/>
    <!-- Charge port -->
    <rect x="-158" y="-14" width="12" height="18" rx="3.5" fill="#4ade80"/>
    <!-- Cable -->
    <path d="M-158 -6 Q-190 -6 -192 -65 Q-194 -112 -180 -124"
      stroke="#4ade80" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <circle cx="-180" cy="-126" r="7" fill="#4ade80" opacity="0.9"/>
  </g>

  <!-- Lightning bolt -->
  <path d="M308 68 L256 214 L290 214 L246 408 L358 194 L316 194 L368 68 Z"
    fill="url(#bolt)"
    filter="url(#boltshadow)"
  />
  <!-- Bolt highlight -->
  <path d="M318 86 L278 200 L304 200 L270 354 L340 206 L312 206 L350 86 Z"
    fill="white" opacity="0.15"
  />
</svg>
