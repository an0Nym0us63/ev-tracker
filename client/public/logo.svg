<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235"/>
      <stop offset="100%" style="stop-color:#0d0f18"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="car" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f4"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <radialGradient id="glow" cx="58%" cy="42%" r="45%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0d0f18;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#4f8ef7" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Glow overlay -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Subtle arc decoration -->
  <circle cx="300" cy="200" r="180" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0.08"/>
  <circle cx="300" cy="200" r="140" fill="none" stroke="#7c5cfc" stroke-width="1" opacity="0.06"/>

  <!-- Car body — side view, centered lower -->
  <g transform="translate(256, 300)">
    <!-- Shadow -->
    <ellipse cx="0" cy="52" rx="155" ry="10" fill="#000" opacity="0.3"/>
    <!-- Main body -->
    <rect x="-148" y="-32" width="296" height="64" rx="18" fill="url(#car)"/>
    <!-- Cabin/roof -->
    <path d="M-82 -32 Q-65 -92 -30 -100 L82 -100 Q112 -88 108 -32 Z" fill="url(#car)" opacity="0.95"/>
    <!-- Window left -->
    <path d="M-68 -36 Q-56 -80 -28 -88 L18 -88 L18 -36 Z" fill="#1a2235" rx="4"/>
    <!-- Window right -->
    <path d="M26 -36 L26 -88 L80 -88 Q102 -80 100 -36 Z" fill="#1a2235"/>
    <!-- Window separator -->
    <rect x="20" y="-88" width="5" height="52" fill="#0d0f18" opacity="0.6"/>
    <!-- Headlight -->
    <rect x="132" y="-14" width="18" height="24" rx="5" fill="#60a5fa" opacity="0.9"/>
    <rect x="134" y="-12" width="12" height="16" rx="3" fill="white" opacity="0.7"/>
    <!-- Taillight -->
    <rect x="-152" y="-12" width="10" height="20" rx="3" fill="#f87171" opacity="0.8"/>
    <!-- Wheel left -->
    <circle cx="-82" cy="38" r="30" fill="#1e2235" stroke="#60a5fa" stroke-width="3.5"/>
    <circle cx="-82" cy="38" r="17" fill="#0d0f18" stroke="#475569" stroke-width="2"/>
    <circle cx="-82" cy="38" r="5" fill="#60a5fa"/>
    <!-- Wheel right -->
    <circle cx="82" cy="38" r="30" fill="#1e2235" stroke="#a78bfa" stroke-width="3.5"/>
    <circle cx="82" cy="38" r="17" fill="#0d0f18" stroke="#475569" stroke-width="2"/>
    <circle cx="82" cy="38" r="5" fill="#a78bfa"/>
    <!-- Charge port -->
    <rect x="-158" y="-16" width="12" height="18" rx="3.5" fill="#22c55e" opacity="0.95"/>
    <!-- Cable -->
    <path d="M-158 -8 Q-185 -8 -188 -60 Q-190 -108 -178 -118"
      stroke="#22c55e" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Cable plug glow -->
    <circle cx="-178" cy="-120" r="6" fill="#22c55e" opacity="0.7"/>
  </g>

  <!-- Lightning bolt — top right, bold and clean -->
  <path d="M310 72 L258 218 L292 218 L248 408 L358 198 L318 198 L368 72 Z"
    fill="url(#bolt)"
    filter="url(#shadow)"
  />
  <!-- Bolt inner highlight -->
  <path d="M318 90 L278 205 L304 205 L272 355 L340 210 L310 210 L348 90 Z"
    fill="white" opacity="0.12"
  />
</svg>
